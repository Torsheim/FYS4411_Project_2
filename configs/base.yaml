seed: 2026

system:
  num_particles: 1
  dimensions: 1
  omega: 1.0
  include_interaction: false
  coulomb_epsilon: 1.0e-12

model:
  num_hidden: 2
  sigma: 1.0
  parameter_scale: 0.01

sampler:
  type: metropolis
  step_size: 1.0
  time_step: 0.05
  diffusion: 0.5
  n_samples: 5000
  n_burn_in: 1000
  thin: 1

optimization:
  optimizer: adam
  learning_rate: 0.03
  n_iterations: 100
  beta1: 0.9
  beta2: 0.999
  epsilon: 1.0e-8

output:
  history_path: results/selected/history.csv
  samples_path: results/processed/local_energies.csv
  checkpoint_path: results/checkpoints/model.npz
