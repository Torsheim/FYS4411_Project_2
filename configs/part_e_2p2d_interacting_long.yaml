seed: 2060
system:
  num_particles: 2
  dimensions: 2
  omega: 1.0
  include_interaction: true
  coulomb_epsilon: 1.0e-10
model:
  num_hidden: 16
  sigma: 1.0
  parameter_scale: 0.01
sampler:
  type: importance
  time_step: 0.08
  diffusion: 0.5
  n_samples: 30000
  n_burn_in: 5000
  thin: 1
optimization:
  optimizer: adam
  learning_rate: 0.005
  n_iterations: 400
output:
  history_path: results/selected/part_e_2p2d_interacting_long.csv
  samples_path: results/processed/part_e_2p2d_interacting_long_local_energies.csv
  checkpoint_path: results/checkpoints/part_e_2p2d_interacting_long_model.npz
