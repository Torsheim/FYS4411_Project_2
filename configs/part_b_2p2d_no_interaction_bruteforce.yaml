seed: 2027
system:
  num_particles: 2
  dimensions: 2
  omega: 1.0
  include_interaction: false
model:
  num_hidden: 4
  sigma: 1.0
  parameter_scale: 0.01
sampler:
  type: metropolis
  step_size: 1.0
  n_samples: 8000
  n_burn_in: 1000
  thin: 1
optimization:
  optimizer: adam
  learning_rate: 0.02
  n_iterations: 100
output:
  history_path: results/selected/part_b_2p2d_no_interaction_bruteforce.csv
  samples_path: results/processed/part_b_2p2d_no_interaction_bruteforce_local_energies.csv
  checkpoint_path: results/checkpoints/part_b_2p2d_no_interaction_bruteforce_model.npz
